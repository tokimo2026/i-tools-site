<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="/i-tools-site/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません - AI実践ラボ</title>
  <link rel="stylesheet" href="/i-tools-site/css/style.css">
  <style>
    .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem; }
    .error-code { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .error-message { font-size: 1.5rem; color: #374151; margin: 1rem 0; }
    .error-description { color: #6b7280; margin-bottom: 2rem; }
    .error-btn { display: inline-block; padding: 0.75rem 2rem; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-radius: 8px; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
    .error-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-message">ページが見つかりません</p>
    <p class="error-description">お探しのページは移動または削除された可能性があります。</p>
    <a href="/i-tools-site/" class="error-btn">トップページへ戻る</a>
  </div>
</body>
</html>
