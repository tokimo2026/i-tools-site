<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;width:1280px;height:670px;overflow:hidden;background:#080818;font-family:'Noto Sans JP',sans-serif}
.card{width:1280px;height:670px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 70% 50% at 65% 30%,rgba(234,179,8,0.1),transparent 60%),
  radial-gradient(ellipse 50% 50% at 30% 70%,rgba(99,102,241,0.08),transparent 55%),
  linear-gradient(155deg,#080818,#0e0e2a 30%,#111138 55%,#0a0a22 100%)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(234,179,8,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(234,179,8,0.03) 1px,transparent 1px);background-size:50px 50px}
.content{position:relative;z-index:1;text-align:center;padding:40px;max-width:1100px}
.badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:22px;font-weight:700;padding:10px 30px;border-radius:30px;margin-bottom:22px;letter-spacing:2px;box-shadow:0 4px 20px rgba(234,179,8,0.4)}
.title{color:#fff;font-size:44px;font-weight:900;line-height:1.35;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,0.4)}
.title em{font-style:normal;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:rgba(255,255,255,0.6);font-size:20px;font-weight:700;margin-bottom:28px}
.features{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.feat{background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.15);color:rgba(255,255,255,0.7);padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700}
.tags{display:flex;gap:8px;justify-content:center}
.tag{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:6px 14px;border-radius:14px;font-size:12px;font-weight:700}
.corner{position:absolute;top:24px;left:28px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:18px;font-weight:900;padding:10px 22px;border-radius:8px;transform:rotate(-2deg);z-index:2;box-shadow:0 4px 15px rgba(234,179,8,0.4)}
.price{position:absolute;top:24px;right:28px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fbbf24;font-size:20px;font-weight:900;padding:10px 22px;border-radius:8px;z-index:2}
.author{position:absolute;bottom:18px;right:28px;z-index:2;color:rgba(255,255,255,0.2);font-size:14px;font-weight:700}
</style></head><body>
<div class="card"><div class="grid"></div>
<div class="corner">実践版</div>
<div class="price">¥980</div>
<div class="content">
<div class="badge">📋 完全ガイド</div>
<h1 class="title">プログラミング知識ゼロから<br><em>30日で副業の仕組み</em>を作る方法</h1>
<p class="subtitle">Claude Code完全ガイド｜プロンプト10選＋30日プラン＋失敗7パターン付き</p>
<div class="features">
<span class="feat">✅ 環境構築15分</span>
<span class="feat">✅ サーバー代0円</span>
<span class="feat">✅ プロンプト10選</span>
<span class="feat">✅ 30日プラン</span>
<span class="feat">✅ 失敗7パターン</span>
</div>
<div class="tags"><span class="tag">#ClaudeCode</span><span class="tag">#非エンジニア</span><span class="tag">#AI副業</span><span class="tag">#30日チャレンジ</span></div>
</div>
<div class="author">TOKIMO｜AI実践メモ</div>
</div></body></html>
