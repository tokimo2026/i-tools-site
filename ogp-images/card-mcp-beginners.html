<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:670px;overflow:hidden;font-family:'Noto Sans JP',sans-serif}
.card{width:1280px;height:670px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.g1{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);top:-100px;right:-80px}
.g2{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.04),transparent 70%);bottom:-60px;left:-60px}
.content{position:relative;z-index:1;text-align:center;padding:40px;max-width:1100px}
.badge{display:inline-block;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:21px;font-weight:700;padding:9px 30px;border-radius:30px;margin-bottom:22px;letter-spacing:2px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.title{color:#fff;font-size:50px;font-weight:900;line-height:1.35;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,0.4)}
.subtitle{color:rgba(255,255,255,0.7);font-size:22px;font-weight:700;margin-bottom:28px}
.tags{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.tag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);padding:8px 20px;border-radius:20px;font-size:16px;font-weight:700}
.author{position:absolute;bottom:24px;right:36px;color:rgba(255,255,255,0.4);font-size:18px;font-weight:700;z-index:1}
.corner{position:absolute;top:28px;left:36px;color:#fff;font-size:19px;font-weight:900;padding:10px 22px;border-radius:8px;transform:rotate(-3deg);z-index:1;box-shadow:0 4px 15px rgba(0,0,0,0.4)}
</style></head><body>
<div class="card"><div class="g1"></div><div class="g2"></div>

<div class="content"><div class="badge">入門ガイド</div><h1 class="title">MCP入門ガイド<br>非エンジニアでもわかる基本と実践</h1><p class="subtitle">Model Context Protocolを初心者目線で徹底解説</p><div class="tags"><span class='tag'>#MCP #入門 #AI活用</span></div></div>
<div class="author">AI実践ラボ｜Tokimo</div></div></body></html>
