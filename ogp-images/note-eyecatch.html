<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 670px; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

.card {
  width: 1280px; height: 670px;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(99,102,241,0.3), transparent 70%);
  top: -100px; right: -100px;
}
.card::after {
  content: ''; position: absolute; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
  bottom: -50px; left: -50px;
}
.content {
  position: relative; z-index: 1; text-align: center; padding: 40px;
}
.badge {
  display: inline-block; background: linear-gradient(135deg, #6366f1, #a855f7);
  color: white; font-size: 22px; font-weight: 700; padding: 8px 28px;
  border-radius: 30px; margin-bottom: 24px; letter-spacing: 2px;
}
.title {
  color: white; font-size: 52px; font-weight: 900; line-height: 1.4;
  max-width: 1000px; margin: 0 auto 20px;
  text-shadow: 0 2px 20px rgba(99,102,241,0.5);
}
.highlight {
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle {
  color: rgba(255,255,255,0.7); font-size: 24px; font-weight: 700;
  margin-bottom: 30px;
}
.tags {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.tag {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8); padding: 8px 20px; border-radius: 20px;
  font-size: 18px; font-weight: 700;
}
.author {
  position: absolute; bottom: 30px; right: 40px; z-index: 1;
  color: rgba(255,255,255,0.5); font-size: 20px; font-weight: 700;
}
.cost-zero {
  position: absolute; top: 30px; left: 40px; z-index: 1;
  background: #ef4444; color: white; font-size: 20px; font-weight: 900;
  padding: 10px 24px; border-radius: 8px; transform: rotate(-3deg);
  box-shadow: 0 4px 15px rgba(239,68,68,0.4);
}
</style>
</head>
<body>
<div class="card">
  <div class="cost-zero">サーバー代 0円</div>
  <div class="content">
    <div class="badge">全手順公開</div>
    <h1 class="title">非エンジニアが<br><span class="highlight">Claude Code</span>で<br>アフィリエイトサイトを構築した全記録</h1>
    <p class="subtitle">GitHub → Netlify → GA4 → Search Console まで全部AIがやった</p>
    <div class="tags">
      <span class="tag">#ClaudeCode</span>
      <span class="tag">#非エンジニア</span>
      <span class="tag">#AI副業</span>
      <span class="tag">#アフィリエイト</span>
    </div>
  </div>
  <div class="author">AI実践ラボ｜Tokimo</div>
</div>
</body>
</html>
