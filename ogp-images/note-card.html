<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:670px;overflow:hidden;font-family:'Noto Sans JP',sans-serif}
.card{width:1280px;height:670px;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.glow1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.3),transparent 70%);top:-120px;right:-100px}
.glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,0.2),transparent 70%);bottom:-60px;left:-60px}
.glow3{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(239,68,68,0.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}
.content{position:relative;z-index:1;text-align:center;padding:40px;max-width:1100px}
.badge{display:inline-block;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-size:22px;font-weight:700;padding:10px 32px;border-radius:30px;margin-bottom:24px;letter-spacing:3px;box-shadow:0 4px 20px rgba(99,102,241,0.4)}
.title{color:#fff;font-size:52px;font-weight:900;line-height:1.35;margin-bottom:18px;text-shadow:0 2px 30px rgba(99,102,241,0.5)}
.highlight{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:rgba(255,255,255,0.7);font-size:23px;font-weight:700;margin-bottom:30px;letter-spacing:1px}
.steps{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
.step{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);padding:10px 18px;border-radius:12px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.step-icon{font-size:18px}
.step-arrow{color:rgba(255,255,255,0.3);font-size:20px}
.tags{display:flex;gap:12px;justify-content:center}
.tag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);padding:8px 20px;border-radius:20px;font-size:16px;font-weight:700}
.corner{position:absolute;top:28px;left:36px;background:#ef4444;color:#fff;font-size:20px;font-weight:900;padding:12px 26px;border-radius:10px;transform:rotate(-3deg);z-index:1;box-shadow:0 4px 20px rgba(239,68,68,0.5);letter-spacing:1px}
.author{position:absolute;bottom:24px;right:36px;color:rgba(255,255,255,0.4);font-size:18px;font-weight:700;z-index:1}
.note-badge{position:absolute;top:28px;right:36px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-size:16px;font-weight:700;padding:8px 20px;border-radius:8px;z-index:1}
</style>
</head>
<body>
<div class="card">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="corner">サーバー代 0円</div>
  <div class="note-badge">📝 note有料記事</div>
  <div class="content">
    <div class="badge">全手順＋プロンプト公開</div>
    <h1 class="title">非エンジニアが<span class="highlight">Claude Code</span>で<br>アフィリエイトサイトを構築した全記録</h1>
    <p class="subtitle">コードは1行も書いていない。全部AIに指示しただけ。</p>
    <div class="steps">
      <span class="step"><span class="step-icon">🏗️</span>サイト構築</span>
      <span class="step-arrow">→</span>
      <span class="step"><span class="step-icon">🚀</span>GitHub+Netlify</span>
      <span class="step-arrow">→</span>
      <span class="step"><span class="step-icon">📊</span>GA4+Search Console</span>
      <span class="step-arrow">→</span>
      <span class="step"><span class="step-icon">💰</span>収益化</span>
    </div>
    <div class="tags">
      <span class="tag">#ClaudeCode</span>
      <span class="tag">#非エンジニア</span>
      <span class="tag">#AI副業</span>
      <span class="tag">#アフィリエイト</span>
    </div>
  </div>
  <div class="author">AI実践ラボ｜Tokimo</div>
</div>
</body>
</html>
