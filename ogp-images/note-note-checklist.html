<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;width:1280px;height:670px;overflow:hidden;background:#080818;font-family:'Noto Sans JP',sans-serif}
.card{width:1280px;height:670px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 70% 50% at 65% 30%,rgba(99,102,241,0.1),transparent 60%),
  radial-gradient(ellipse 50% 50% at 30% 70%,rgba(139,92,246,0.07),transparent 55%),
  linear-gradient(155deg,#080818,#0e0e2a 30%,#111138 55%,#0a0a22 100%)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);background-size:50px 50px}
.content{position:relative;z-index:1;text-align:center;padding:40px;max-width:1100px}
.badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:20px;font-weight:700;padding:9px 28px;border-radius:30px;margin-bottom:22px;letter-spacing:2px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.title{color:#fff;font-size:46px;font-weight:900;line-height:1.35;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,0.4)}
.title em{font-style:normal;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:rgba(255,255,255,0.6);font-size:20px;font-weight:700;margin-bottom:28px}
.tags{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tag{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);padding:7px 18px;border-radius:18px;font-size:14px;font-weight:700}
.author{position:absolute;bottom:20px;right:32px;color:rgba(255,255,255,0.2);font-size:14px;font-weight:700;z-index:1}
.corner{position:absolute;top:24px;left:28px;color:#fff;font-size:18px;font-weight:900;padding:10px 22px;border-radius:8px;transform:rotate(-2deg);z-index:1;box-shadow:0 4px 15px rgba(0,0,0,0.4)}
</style></head><body>
<div class="card"><div class="grid"></div>
<div class='corner' style='background:#f59e0b'>7項目</div>
<div class="content"><div class="badge">品質管理</div><h1 class="title">AIで記事を書くときに<br>俺がやっているチェックリスト</h1><p class="subtitle">AI記事のクオリティを上げる7つの確認項目</p><div class="tags"><span class='tag'>#AIライティング #品質管理 #チェック</span></div></div>
<div class="author">TOKIMO｜AI実践メモ</div></div></body></html>
