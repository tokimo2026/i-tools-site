<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;width:1280px;height:670px;overflow:hidden;background:#080818;font-family:'Noto Sans JP',sans-serif}

.wrap{
  width:1280px;height:670px;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 50% at 70% 30%, rgba(234,179,8,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 25% 70%, rgba(59,130,246,0.08) 0%, transparent 55%),
    linear-gradient(155deg, #080818 0%, #0c0c28 30%, #111138 55%, #0a0a22 100%);
}

/* グリッド */
.grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(234,179,8,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(234,179,8,0.03) 1px, transparent 1px);
  background-size:50px 50px;
}

/* レイアウト */
.main{
  position:relative;z-index:1;display:flex;height:100%;
}

/* 左カラム：ランキング数字 */
.left{
  width:340px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-right:1px solid rgba(234,179,8,0.1);
}

.rank-circle{
  width:200px;height:200px;border-radius:50%;
  background:linear-gradient(135deg,rgba(234,179,8,0.12),rgba(217,119,6,0.08));
  border:2px solid rgba(234,179,8,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-bottom:20px;box-shadow:0 0 40px rgba(234,179,8,0.1);
}
.rank-label{color:rgba(234,179,8,0.7);font-size:14px;font-weight:700;letter-spacing:2px}
.rank-num{color:#f59e0b;font-size:72px;font-weight:900;line-height:1}
.rank-unit{color:rgba(234,179,8,0.5);font-size:16px;font-weight:700;margin-top:2px}

/* Xアイコン模倣 */
.x-icons{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:240px}
.x-dot{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:rgba(255,255,255,0.3);font-weight:700;
}

/* 右カラム */
.right{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:50px 60px 50px 50px;
}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff;font-size:15px;font-weight:700;
  padding:6px 18px;border-radius:20px;margin-bottom:18px;
  box-shadow:0 2px 12px rgba(234,179,8,0.3);width:fit-content;
}

.title{
  color:#fff;font-size:38px;font-weight:900;line-height:1.35;margin-bottom:14px;
}
.title em{
  font-style:normal;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.desc{
  color:rgba(255,255,255,0.5);font-size:17px;font-weight:500;
  line-height:1.7;margin-bottom:24px;
}

.features{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.feat{
  background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.15);
  color:rgba(255,255,255,0.7);padding:8px 16px;border-radius:10px;
  font-size:13px;font-weight:700;
}

.tags{display:flex;gap:8px}
.tag{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4);padding:6px 14px;border-radius:14px;
  font-size:12px;font-weight:700;
}

.price{
  position:absolute;top:24px;left:28px;z-index:2;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff;font-size:17px;font-weight:900;
  padding:10px 22px;border-radius:8px;transform:rotate(-2deg);
  box-shadow:0 4px 15px rgba(234,179,8,0.4);
}

.year{
  position:absolute;top:24px;right:28px;z-index:2;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.4);font-size:14px;font-weight:700;
  padding:8px 16px;border-radius:8px;
}

.author{
  position:absolute;bottom:18px;right:28px;z-index:2;
  color:rgba(255,255,255,0.2);font-size:14px;font-weight:700;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid"></div>
  <div class="price">¥200</div>
  <div class="year">2026年版</div>

  <div class="main">
    <div class="left">
      <div class="rank-circle">
        <span class="rank-label">厳選</span>
        <span class="rank-num">30</span>
        <span class="rank-unit">アカウント</span>
      </div>
      <div class="x-icons">
        <div class="x-dot">1</div><div class="x-dot">2</div><div class="x-dot">3</div>
        <div class="x-dot">4</div><div class="x-dot">5</div><div class="x-dot">6</div>
        <div class="x-dot">7</div><div class="x-dot">8</div><div class="x-dot">9</div>
        <div class="x-dot">10</div><div class="x-dot">…</div><div class="x-dot">30</div>
      </div>
    </div>

    <div class="right">
      <div class="badge">👑 完全ランキング</div>
      <h1 class="title">日本の<em>AIインフルエンサー</em><br>完全ランキング30</h1>
      <p class="desc">Xで情報収集・実践活用に効く<br>最強フォローリスト</p>
      <div class="features">
        <span class="feat">📊 実用度で評価</span>
        <span class="feat">🎯 非エンジニア目線</span>
        <span class="feat">🔄 最新トレンド対応</span>
      </div>
      <div class="tags">
        <span class="tag">#AIインフルエンサー</span>
        <span class="tag">#ランキング</span>
        <span class="tag">#X活用</span>
      </div>
    </div>
  </div>

  <div class="author">AI実践ラボ｜Tokimo</div>
</div>
</body>
</html>
